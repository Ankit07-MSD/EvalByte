# Builds the React app and publishes to GitHub Pages (so the site is not just README).
#
# After first push with this file:
# 1. Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
# 2. Wait for the "Deploy frontend to GitHub Pages" workflow to finish (Actions tab).
# 3. Open: https://<username>.github.io/<repo-name>/
#
# Repo name must match the URL path. If your repo is "Evalbyte" but URL uses "evalbyte",
# GitHub is case-insensitive for URLs; use lowercase in VITE_BASE if assets 404.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          # Subpath for https://user.github.io/REPO_NAME/
          VITE_BASE: /${{ github.event.repository.name }}/
          # Optional: set repo secret VITE_API_URL to your deployed backend (e.g. https://api.onrender.com)
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
